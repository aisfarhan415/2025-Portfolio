<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background -->
  <rect width="800" height="500" rx="24" fill="#F0F4F8" />
  
  <!-- Subtle decorative shape in background -->
  <circle cx="150" cy="400" r="120" fill="#DBEAFE" opacity="0.6" />
  <circle cx="700" cy="100" r="180" fill="#E0F2FE" opacity="0.6" />

  <!-- Browser Window Container -->
  <g transform="translate(100, 60)">
    <!-- Browser Window Shadow & Border -->
    <rect width="600" height="380" rx="12" fill="#FFFFFF" filter="drop-shadow(0px 20px 25px rgba(15, 23, 42, 0.08))" stroke="#E2E8F0" stroke-width="1.5" />
    
    <!-- Browser Header Bar -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 588 A 12 12 0 0 1 600 12 V 40 H 0 Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" />
    
    <!-- Window Control Dots -->
    <circle cx="20" cy="20" r="5" fill="#EF4444" />
    <circle cx="36" cy="20" r="5" fill="#F59E0B" />
    <circle cx="52" cy="20" r="5" fill="#10B981" />
    
    <!-- Address Bar -->
    <rect x="80" y="10" width="440" height="20" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" />
    <text x="100" y="24" font-family="sans-serif" font-size="10" fill="#94A3B8">localhost:3001</text>
    
    <!-- Sidebar -->
    <rect x="0" y="40" width="140" height="340" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
    <!-- Sidebar Menu Items -->
    <rect x="15" y="60" width="110" height="24" rx="6" fill="#E0F2FE" />
    <circle cx="30" cy="72" r="5" fill="#0284C7" />
    <rect x="45" y="68" width="65" height="8" rx="4" fill="#0284C7" />
    
    <circle cx="30" cy="112" r="5" fill="#94A3B8" />
    <rect x="45" y="108" width="55" height="8" rx="4" fill="#94A3B8" />
    
    <circle cx="30" cy="152" r="5" fill="#94A3B8" />
    <rect x="45" y="148" width="70" height="8" rx="4" fill="#94A3B8" />
    
    <!-- Main Chat Window -->
    <!-- Chat Header -->
    <rect x="140" y="40" width="460" height="40" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <circle cx="165" cy="60" r="6" fill="#10B981" /> <!-- Online status -->
    <text x="180" y="64" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155">Local Ollama (Qwen 2.5 8B)</text>
    
    <!-- Message 1 (User) -->
    <path d="M 320 100 H 570 A 10 10 0 0 1 580 110 V 134 A 10 10 0 0 1 570 144 H 330 A 10 10 0 0 1 320 134 V 100 Z" fill="#3B82F6" />
    <rect x="340" y="112" width="220" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.9" />
    <rect x="340" y="126" width="140" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.9" />
    
    <!-- Message 2 (Bot / Code Block) -->
    <path d="M 160 160 H 450 A 10 10 0 0 1 460 170 V 270 A 10 10 0 0 1 450 280 H 170 A 10 10 0 0 1 160 270 V 160 Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
    <!-- Bot Avatar -->
    <circle cx="178" cy="180" r="8" fill="#8B5CF6" />
    <rect x="194" y="176" width="120" height="8" rx="4" fill="#64748B" />
    <!-- Code Editor Box inside Bot Message -->
    <rect x="178" y="196" width="262" height="70" rx="6" fill="#0F172A" />
    <rect x="190" y="210" width="140" height="6" rx="3" fill="#38BDF8" />
    <rect x="190" y="222" width="200" height="6" rx="3" fill="#F472B6" />
    <rect x="190" y="234" width="80" height="6" rx="3" fill="#34D399" />
    <rect x="190" y="246" width="160" height="6" rx="3" fill="#FBBF24" />
    
    <!-- Chat Input Area -->
    <rect x="155" y="320" width="430" height="36" rx="18" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" />
    <rect x="175" y="334" width="180" height="8" rx="4" fill="#94A3B8" />
    <circle cx="560" cy="338" r="10" fill="#3B82F6" />
    <path d="M 557 338 L 563 338 M 561 335 L 564 338 L 561 341" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
