<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1528" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E1E38" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" rx="24" fill="url(#bgGrad)" />
  
  <!-- Grid pattern overlay -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400 M 0 450 L 800 450" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 100 0 L 100 500 M 200 0 L 200 500 M 300 0 L 300 500 M 400 0 L 400 500 M 500 0 L 500 500 M 600 0 L 600 500 M 700 0 L 700 500" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  
  <!-- Central Icon (Brain + Chat Bubble) -->
  <g transform="translate(400, 220)" filter="url(#glow)">
    <!-- Chat Bubble Outline -->
    <path d="M -70 -70 H 70 C 75.5 -70 80 -65.5 80 -60 V 40 C 80 45.5 75.5 50 70 50 H -10 L -40 80 L -40 50 H -70 C -75.5 50 -80 45.5 -80 40 V -60 C -80 -65.5 -75.5 -70 -70 -70 Z" stroke="url(#iconGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="#000000" fill-opacity="0.2" />
    
    <!-- Minimalist Brain/Network Node Lines -->
    <circle cx="-25" cy="-20" r="4" fill="#3B82F6" />
    <circle cx="25" cy="-20" r="4" fill="#8B5CF6" />
    <circle cx="-35" cy="15" r="4" fill="#3B82F6" />
    <circle cx="35" cy="15" r="4" fill="#8B5CF6" />
    <circle cx="0" cy="-35" r="5" fill="#FFFFFF" />
    <circle cx="0" cy="5" r="6" fill="#3B82F6" />
    <circle cx="0" cy="30" r="4" fill="#8B5CF6" />
    
    <!-- Connections -->
    <line x1="-25" y1="-20" x2="0" y2="-35" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
    <line x1="25" y1="-20" x2="0" y2="-35" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
    <line x1="-25" y1="-20" x2="0" y2="5" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
    <line x1="25" y1="-20" x2="0" y2="5" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
    <line x1="-35" y1="15" x2="0" y2="5" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
    <line x1="35" y1="15" x2="0" y2="5" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
    <line x1="0" y1="5" x2="0" y2="30" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" />
  </g>
  
  <!-- Text Label -->
  <text x="400" y="380" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F8FAFC" text-anchor="middle" letter-spacing="0.05em">OLLAMA CHAT CLIENT</text>
  <text x="400" y="410" font-family="'JetBrains Mono', monospace" font-size="14" fill="#94A3B8" text-anchor="middle" letter-spacing="0.1em">LOCAL AI • STREAMING • PRIVATE</text>
</svg>
