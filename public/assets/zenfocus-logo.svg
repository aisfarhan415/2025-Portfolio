<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="logoGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2" />
  <g transform="translate(100, 100)" filter="url(#logoGlow)">
    <circle cx="0" cy="0" r="35" stroke="url(#logoGrad)" stroke-width="3" stroke-dasharray="160 60" stroke-linecap="round" fill="#000000" fill-opacity="0.2" />
    <path d="M 0 -18 C -8 -5 -12 7 0 18 C 12 7 8 -5 0 -18 Z" fill="url(#logoGrad)" />
  </g>
</svg>
