<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background -->
  <rect width="800" height="500" rx="24" fill="#E6F4EA" />
  
  <!-- Subtle decorative shapes -->
  <circle cx="650" cy="400" r="140" fill="#CEEAD6" opacity="0.6" />
  <circle cx="100" cy="100" r="120" fill="#D2EBD9" opacity="0.6" />

  <!-- Phone Mockup Container (Centered) -->
  <g transform="translate(280, 40)">
    <!-- Shadow & Bezel -->
    <rect width="240" height="420" rx="32" fill="#1E293B" filter="drop-shadow(0px 20px 30px rgba(15, 23, 42, 0.12))" />
    <!-- Screen Area -->
    <rect x="8" y="8" width="224" height="404" rx="24" fill="#ECEFF1" />
    
    <!-- Camera Notch -->
    <rect x="80" y="8" width="80" height="18" rx="9" fill="#1E293B" />
    
    <!-- Telegram App Header -->
    <path d="M 8 32 A 0 0 0 0 1 8 32 H 232 A 0 0 0 0 1 232 32 V 70 H 8 Z" fill="#0B8043" />
    <circle cx="28" cy="51" r="10" fill="#FFFFFF" fill-opacity="0.2" />
    <path d="M 26 47 L 22 51 L 26 55" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Bot Avatar -->
    <circle cx="56" cy="51" r="12" fill="#34A853" />
    <circle cx="56" cy="51" r="7" fill="#FFFFFF" />
    
    <!-- Chat Title -->
    <text x="76" y="50" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">AI Manager Bot</text>
    <text x="76" y="60" font-family="sans-serif" font-size="7" fill="#E6F4EA">bot assistant</text>
    
    <!-- Message 1 (User Command) -->
    <path d="M 120 90 H 216 A 8 8 0 0 1 224 98 V 110 A 8 8 0 0 1 216 118 H 128 A 8 8 0 0 1 120 110 V 90 Z" fill="#CEEAD6" />
    <text x="130" y="102" font-family="sans-serif" font-size="8" font-weight="bold" fill="#0B8043">/mode ngoding</text>
    <text x="130" y="112" font-family="sans-serif" font-size="7" fill="#5F6368">Execute server script</text>
    
    <!-- Message 2 (Bot - Terminal / Code Execution Output) -->
    <path d="M 16 130 H 184 A 8 8 0 0 1 192 138 V 282 A 8 8 0 0 1 184 290 H 24 A 8 8 0 0 1 16 282 V 130 Z" fill="#FFFFFF" />
    <!-- Bot Avatar Small -->
    <circle cx="28" cy="146" r="6" fill="#34A853" />
    <text x="38" y="148" font-family="sans-serif" font-size="7" font-weight="bold" fill="#3C4043">AI Manager</text>
    
    <!-- Inline Terminal Widget inside Telegram Chat -->
    <rect x="24" y="160" width="160" height="116" rx="6" fill="#202124" />
    <!-- Terminal Header -->
    <rect x="24" y="160" width="160" height="16" rx="6" fill="#3C4043" />
    <circle cx="34" cy="168" r="3" fill="#EA4335" />
    <circle cx="42" cy="168" r="3" fill="#FBBC05" />
    <circle cx="50" cy="168" r="3" fill="#34A853" />
    <text x="62" y="171" font-family="monospace" font-size="6" fill="#9AA0A6">bash - terminal</text>
    
    <!-- Command Execution Logs -->
    <text x="32" y="192" font-family="monospace" font-size="6" fill="#34A853">$ ./start_bot.sh</text>
    <text x="32" y="204" font-family="monospace" font-size="6" fill="#F1F3F4">Starting server service...</text>
    <text x="32" y="216" font-family="monospace" font-size="6" fill="#FBBF24">Loading Gemini 3.5 API...</text>
    <text x="32" y="228" font-family="monospace" font-size="6" fill="#34A853">Success: bot active on port 443</text>
    <text x="32" y="240" font-family="monospace" font-size="6" fill="#F1F3F4">Memory limit: 512MB [OK]</text>
    <text x="32" y="252" font-family="monospace" font-size="6" fill="#818CF8">Self-healing watchdog active</text>
    
    <!-- Telegram Input Bar -->
    <rect x="16" y="376" width="208" height="24" rx="12" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1" />
    <text x="28" y="391" font-family="sans-serif" font-size="8" fill="#9AA0A6">Write command...</text>
    <circle cx="210" cy="388" r="7" fill="#0B8043" />
  </g>
</svg>
