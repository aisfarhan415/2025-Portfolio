<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061F12" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" rx="24" fill="url(#bgGrad)" />
  
  <!-- Grid pattern overlay -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400 M 0 450 L 800 450" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 100 0 L 100 500 M 200 0 L 200 500 M 300 0 L 300 500 M 400 0 L 400 500 M 500 0 L 500 500 M 600 0 L 600 500 M 700 0 L 700 500" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  
  <!-- Central Icon (Robot Head Outline + Connection Dots) -->
  <g transform="translate(400, 220)" filter="url(#glow)">
    <!-- Robot Face Outer Ring -->
    <path d="M -60 -50 C -60 -70 -40 -80 0 -80 C 40 -80 60 -70 60 -50 V 20 C 60 35 45 50 0 50 C -45 50 -60 35 -60 20 Z" stroke="url(#iconGrad)" stroke-width="4" stroke-linecap="round" fill="#000000" fill-opacity="0.2" />
    <!-- Antennas -->
    <line x1="-40" y1="-80" x2="-60" y2="-100" stroke="#10B981" stroke-width="3" stroke-linecap="round" />
    <circle cx="-60" cy="-100" r="5" fill="#10B981" />
    <line x1="40" y1="-80" x2="60" y2="-100" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" />
    <circle cx="60" cy="-100" r="5" fill="#3B82F6" />
    
    <!-- Eyes -->
    <rect x="-35" y="-30" width="20" height="8" rx="4" fill="#10B981" />
    <rect x="15" y="-30" width="20" height="8" rx="4" fill="#3B82F6" />
    
    <!-- Mouth / Speaker Grille -->
    <path d="M -25 15 H 25" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <path d="M -15 25 H 15" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- Text Label -->
  <text x="400" y="380" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F8FAFC" text-anchor="middle" letter-spacing="0.05em">AI MANAGER BOT</text>
  <text x="400" y="410" font-family="'JetBrains Mono', monospace" font-size="14" fill="#94A3B8" text-anchor="middle" letter-spacing="0.1em">TELEGRAM • MULTI-MODAL • AUTONOMOUS</text>
</svg>
