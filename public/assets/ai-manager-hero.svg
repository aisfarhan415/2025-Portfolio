<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background -->
  <rect width="800" height="500" rx="24" fill="#E8F5E9" />
  
  <!-- Subtle decorative shapes -->
  <circle cx="120" cy="400" r="140" fill="#C8E6C9" opacity="0.5" />
  <circle cx="680" cy="100" r="160" fill="#C8E6C9" opacity="0.5" />

  <!-- Phone 2 (Right, Background) -->
  <g transform="translate(430, 80)">
    <!-- Shadow & Bezel -->
    <rect width="210" height="360" rx="28" fill="#1E293B" filter="drop-shadow(0px 10px 20px rgba(15, 23, 42, 0.08))" />
    <!-- Screen -->
    <rect x="7" y="7" width="196" height="346" rx="21" fill="#202124" /> <!-- Dark theme screen for terminal -->
    
    <!-- Camera Notch -->
    <rect x="70" y="7" width="70" height="14" rx="7" fill="#1E293B" />
    
    <!-- Telegram App Header -->
    <path d="M 7 24 H 203 V 56 H 7 Z" fill="#2D2F31" />
    <circle cx="22" cy="40" r="8" fill="#FFFFFF" fill-opacity="0.1" />
    <circle cx="44" cy="40" r="10" fill="#0F9D58" />
    <text x="60" y="38" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF">Ngoding Mode</text>
    <text x="60" y="47" font-family="sans-serif" font-size="6" fill="#80868B">autonomous shell</text>
    
    <!-- Terminal Logs Container -->
    <rect x="15" y="70" width="180" height="230" rx="10" fill="#0F172A" stroke="#334155" stroke-width="1.5" />
    <!-- Terminal Dots -->
    <circle cx="27" cy="80" r="3" fill="#EF4444" />
    <circle cx="35" cy="80" r="3" fill="#F59E0B" />
    <circle cx="43" cy="80" r="3" fill="#10B981" />
    
    <!-- Shell commands and logs -->
    <text x="25" y="105" font-family="monospace" font-size="7" font-weight="bold" fill="#38BDF8">$ agy build --prod</text>
    <text x="25" y="120" font-family="monospace" font-size="6.5" fill="#94A3B8">Loading configs...</text>
    <text x="25" y="132" font-family="monospace" font-size="6.5" fill="#94A3B8">Bundling Next.js app</text>
    <rect x="25" y="142" width="140" height="5" rx="2.5" fill="#1E293B" />
    <rect x="25" y="142" width="105" height="5" rx="2.5" fill="#10B981" />
    <text x="25" y="162" font-family="monospace" font-size="6.5" fill="#4ADE80">Compiled successfully [1.2s]</text>
    
    <text x="25" y="185" font-family="monospace" font-size="7" font-weight="bold" fill="#38BDF8">$ git commit -m "feat: deploy"</text>
    <text x="25" y="198" font-family="monospace" font-size="6.5" fill="#94A3B8">10 files changed, 25 insertions(+)</text>
    
    <text x="25" y="220" font-family="monospace" font-size="7" font-weight="bold" fill="#38BDF8">$ git push origin production</text>
    <text x="25" y="235" font-family="monospace" font-size="6.5" fill="#34D399">remote: Deploy active on AWS</text>
    <text x="25" y="247" font-family="monospace" font-size="6.5" fill="#34D399">remote: Status: 200 OK 🚀</text>
    
    <!-- Status badge -->
    <rect x="25" y="265" width="65" height="14" rx="7" fill="#064E3B" stroke="#059669" stroke-width="1" />
    <circle cx="33" cy="272" r="3" fill="#34D399" />
    <text x="42" y="275" font-family="sans-serif" font-size="6" font-weight="bold" fill="#A7F3D0">ONLINE</text>
  </g>

  <!-- Phone 1 (Left, Foreground) -->
  <g transform="translate(160, 40)">
    <!-- Shadow & Bezel -->
    <rect width="230" height="390" rx="30" fill="#1E293B" filter="drop-shadow(0px 20px 30px rgba(15, 23, 42, 0.15))" />
    <!-- Screen -->
    <rect x="8" y="8" width="214" height="374" rx="22" fill="#ECEFF1" />
    
    <!-- Camera Notch -->
    <rect x="75" y="8" width="80" height="15" rx="7.5" fill="#1E293B" />
    
    <!-- Telegram App Header -->
    <path d="M 8 30 H 222 V 68 H 8 Z" fill="#0B8043" />
    <circle cx="26" cy="49" r="9" fill="#FFFFFF" fill-opacity="0.15" />
    <path d="M 24 45 L 20 49 L 24 53" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <circle cx="52" cy="49" r="11" fill="#34A853" />
    <circle cx="52" cy="49" r="6" fill="#FFFFFF" />
    <text x="70" y="48" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">AI Manager Bot</text>
    <text x="70" y="58" font-family="sans-serif" font-size="6.5" fill="#E6F4EA">active agent</text>
    
    <!-- Telegram Chat Body -->
    <!-- Message 1 (User) -->
    <path d="M 110 85 H 202 A 8 8 0 0 1 210 93 V 107 A 8 8 0 0 1 202 115 H 118 A 8 8 0 0 1 110 107 V 85 Z" fill="#CEEAD6" />
    <text x="120" y="97" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#0B8043">/mode planner</text>
    <text x="120" y="107" font-family="sans-serif" font-size="7.5" fill="#5F6368">Daily agent assistant</text>
    
    <!-- Message 2 (Bot - Planner details) -->
    <path d="M 18 127 H 182 A 8 8 0 0 1 190 135 V 275 A 8 8 0 0 1 182 283 H 26 A 8 8 0 0 1 18 275 V 127 Z" fill="#FFFFFF" />
    <circle cx="28" cy="141" r="5" fill="#34A853" />
    <text x="37" y="143" font-family="sans-serif" font-size="7.5" font-weight="bold" fill="#3C4043">AI Manager</text>
    
    <!-- Planner Task Card representation inside Chat -->
    <rect x="26" y="153" width="156" height="118" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
    <text x="36" y="169" font-family="sans-serif" font-size="8.5" font-weight="bold" fill="#1E293B">Today's Focus Mode</text>
    
    <!-- Tasks inside Planner Mode -->
    <circle cx="40" cy="188" r="4" fill="#34A853" />
    <text x="50" y="191" font-family="sans-serif" font-size="7.5" fill="#475569">09:00 - UI/UX Design System</text>
    
    <circle cx="40" cy="206" r="4" fill="#34A853" />
    <text x="50" y="209" font-family="sans-serif" font-size="7.5" fill="#475569">11:00 - Clean code architecture</text>
    
    <circle cx="40" cy="224" r="4" fill="#3B82F6" />
    <text x="50" y="227" font-family="sans-serif" font-size="7.5" fill="#475569">14:00 - Launch production build</text>
    
    <circle cx="40" cy="242" r="4" fill="#F59E0B" />
    <text x="50" y="245" font-family="sans-serif" font-size="7.5" fill="#475569">16:00 - Deploy to AWS server</text>
    
    <!-- Chat Input Area -->
    <rect x="18" y="340" width="194" height="24" rx="12" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1" />
    <text x="30" y="355" font-family="sans-serif" font-size="8.5" fill="#9AA0A6">Type a message...</text>
    <circle cx="198" cy="352" r="7" fill="#0B8043" />
  </g>
</svg>
