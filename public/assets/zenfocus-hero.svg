<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background -->
  <rect width="800" height="500" rx="24" fill="#FFF2E6" />
  
  <!-- Subtle decorative shapes -->
  <circle cx="700" cy="400" r="150" fill="#FFE0C2" opacity="0.6" />
  <circle cx="100" cy="100" r="120" fill="#FFEBD6" opacity="0.6" />

  <!-- Browser Window Container -->
  <g transform="translate(100, 60)">
    <!-- Browser Window Shadow & Border -->
    <rect width="600" height="380" rx="12" fill="#FFFFFF" filter="drop-shadow(0px 20px 25px rgba(15, 23, 42, 0.08))" stroke="#FFE0C2" stroke-width="1.5" />
    
    <!-- Browser Header Bar -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 H 588 A 12 12 0 0 1 600 12 V 40 H 0 Z" fill="#FFF9F5" stroke="#FFE0C2" stroke-width="1.5" />
    
    <!-- Window Control Dots -->
    <circle cx="20" cy="20" r="5" fill="#EF4444" />
    <circle cx="36" cy="20" r="5" fill="#F59E0B" />
    <circle cx="52" cy="20" r="5" fill="#10B981" />
    
    <!-- Address Bar -->
    <rect x="80" y="10" width="440" height="20" rx="6" fill="#FFFDFB" stroke="#FFE0C2" stroke-width="1" />
    <text x="100" y="24" font-family="sans-serif" font-size="10" fill="#C2410C">localhost:3000</text>
    
    <!-- Dashboard Workspace Area -->
    <!-- Left Column: Pomodoro Focus Widget -->
    <rect x="20" y="60" width="240" height="300" rx="16" fill="#FFF9F5" stroke="#FFE0C2" stroke-width="1" />
    <text x="140" y="86" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7C2D12" text-anchor="middle">Focus Session</text>
    
    <!-- Circular Timer Progress -->
    <g transform="translate(140, 190)">
      <circle cx="0" cy="0" r="60" stroke="#FFE0C2" stroke-width="6" fill="none" />
      <circle cx="0" cy="0" r="60" stroke="#EA580C" stroke-width="8" stroke-dasharray="376" stroke-dashoffset="100" stroke-linecap="round" fill="none" transform="rotate(-90)" />
      <text x="0" y="8" font-family="sans-serif" font-size="24" font-weight="bold" fill="#7C2D12" text-anchor="middle">18:45</text>
      <text x="0" y="25" font-family="sans-serif" font-size="8" fill="#C2410C" text-anchor="middle">Work Block</text>
    </g>
    
    <!-- Audio Wave Synthesizer Controls at bottom -->
    <rect x="35" y="280" width="210" height="64" rx="10" fill="#FFFFFF" stroke="#FFE0C2" stroke-width="1" />
    <text x="45" y="296" font-family="sans-serif" font-size="8" font-weight="bold" fill="#7C2D12">Ambient Soundscape</text>
    <!-- Volume Slider Mockup -->
    <circle cx="50" cy="318" r="8" fill="#EA580C" />
    <rect x="65" y="316" width="100" height="4" rx="2" fill="#FFE0C2" />
    <rect x="65" y="316" width="60" height="4" rx="2" fill="#EA580C" />
    <circle cx="125" cy="318" r="5" fill="#EA580C" />
    <circle cx="190" cy="318" r="10" fill="#FFF9F5" stroke="#FFE0C2" stroke-width="1" />
    
    <!-- Right Column: Focus Kanban Board -->
    <rect x="280" y="60" width="300" height="300" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
    <text x="300" y="86" font-family="sans-serif" font-size="12" font-weight="bold" fill="#334155">Task Board</text>
    
    <!-- Kanban Columns -->
    <!-- Column 1: Active -->
    <rect x="296" y="106" width="128" height="240" rx="8" fill="#F1F5F9" />
    <text x="306" y="122" font-family="sans-serif" font-size="9" font-weight="bold" fill="#475569">In Progress (2)</text>
    <!-- Task Cards -->
    <rect x="302" y="132" width="116" height="48" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.02))" />
    <rect x="312" y="144" width="80" height="6" rx="3" fill="#64748B" />
    <rect x="312" y="156" width="50" height="6" rx="3" fill="#94A3B8" />
    <rect x="312" y="166" width="30" height="6" rx="3" fill="#F97316" /> <!-- Tag color -->
    
    <rect x="302" y="190" width="116" height="48" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.02))" />
    <rect x="312" y="202" width="90" height="6" rx="3" fill="#64748B" />
    <rect x="312" y="214" width="40" height="6" rx="3" fill="#94A3B8" />
    
    <!-- Column 2: Done -->
    <rect x="436" y="106" width="128" height="240" rx="8" fill="#F1F5F9" />
    <text x="446" y="122" font-family="sans-serif" font-size="9" font-weight="bold" fill="#475569">Done (4)</text>
    <rect x="442" y="132" width="116" height="48" rx="6" fill="#FFFFFF" fill-opacity="0.7" stroke="#E2E8F0" stroke-width="1" />
    <rect x="452" y="144" width="70" height="6" rx="3" fill="#94A3B8" />
    <path d="M 536 142 L 539 145 L 544 140" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
